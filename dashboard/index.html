<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Bikeshare | Portal Login</title>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#24262d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=121">
    <script>
        // If already logged in, redirect straight to their dashboard
        const token = sessionStorage.getItem('adminToken');
        const role = sessionStorage.getItem('userRole');
        if (token) {
            if (role === 'student') {
                window.location.href = '/student-dashboard.html';
            } else {
                window.location.href = '/admin-dashboard.html';
            }
        }
    </script>
</head>

<body class="d-flex flex-column align-items-center justify-content-center"
    style="height: 100dvh; overflow: hidden; background-color: var(--bg-main);">

    <!-- Unified Portal Login Card -->
    <div id="login-card" class="card shadow-lg p-3 p-sm-4 w-100"
        style="max-width: 400px; border-radius: var(--radius-md); background-color: var(--bg-panel); border: 1px solid var(--border);">
        <div class="text-center mb-4">
            <h3 class="h4 fw-bold text-dark mb-1" style="letter-spacing: -0.02em;">UPBS Portal Login</h3>
            <p id="login-desc" class="small text-muted">Enter your registered mobile number to sign in.</p>
        </div>

        <div id="login-error" class="alert alert-danger py-2 px-3 text-center small mb-3" style="display: none;"></div>

        <!-- Student Mobile Login Form -->
        <div id="student-login-form" class="d-flex flex-column gap-3 mb-3">
            <div class="settings-input-group d-flex flex-column gap-1">
                <label class="form-label settings-label small fw-semibold text-muted text-uppercase mb-0">Mobile
                    Number</label>
                <input type="text" id="student-phone" class="form-control" placeholder="Enter Phone Number">
            </div>
        </div>

        <!-- Admin Fallback Login Form (Hidden by default) -->
        <div id="admin-login-form" class="d-flex flex-column gap-3 mb-3" style="display: none !important;">
            <div class="settings-input-group d-flex flex-column gap-1">
                <label
                    class="form-label settings-label small fw-semibold text-muted text-uppercase mb-0">Username</label>
                <input type="text" id="admin-username" class="form-control" placeholder="Enter username">
            </div>
            <div class="settings-input-group d-flex flex-column gap-1">
                <label
                    class="form-label settings-label small fw-semibold text-muted text-uppercase mb-0">Password</label>
                <input type="password" id="admin-password" class="form-control" placeholder="Enter password">
            </div>
        </div>

        <button id="btn-login-submit"
            class="btn btn-accent w-100 fw-bold py-2 d-flex justify-content-center align-items-center gap-2 mb-3"
            style="height: 42px; border-radius: var(--radius-sm); transition: all 0.3s ease;">
            <span id="login-btn-text">Sign In</span>
        </button>

        <!-- Toggle Mode Link -->
        <div class="text-center">
            <a href="#" id="toggle-login-mode" class="small text-muted" style="text-decoration: underline;">Admin
                Credentials Login</a>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleLoginModeBtn = document.getElementById('toggle-login-mode');
            const studentLoginForm = document.getElementById('student-login-form');
            const adminLoginForm = document.getElementById('admin-login-form');
            const loginDesc = document.getElementById('login-desc');
            const loginError = document.getElementById('login-error');
            const btnLoginSubmit = document.getElementById('btn-login-submit');
            const btnText = document.getElementById('login-btn-text');

            let isStudentLogin = true;

            // Toggle login forms
            if (toggleLoginModeBtn) {
                toggleLoginModeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    isStudentLogin = !isStudentLogin;
                    loginError.style.display = 'none';

                    if (isStudentLogin) {
                        studentLoginForm.style.setProperty('display', 'flex', 'important');
                        adminLoginForm.style.setProperty('display', 'none', 'important');
                        toggleLoginModeBtn.textContent = "Admin Credentials Login";
                        loginDesc.textContent = "Enter your registered mobile number to sign in.";
                    } else {
                        studentLoginForm.style.setProperty('display', 'none', 'important');
                        adminLoginForm.style.setProperty('display', 'flex', 'important');
                        toggleLoginModeBtn.textContent = "User Mobile Login";
                        loginDesc.textContent = "Please authenticate with admin credentials.";
                    }
                });
            }

            // Submits login forms
            async function handleLoginSubmit() {
                loginError.style.display = 'none';
                const originalBtnText = btnText ? btnText.textContent : 'Sign In';

                try {
                    btnLoginSubmit.disabled = true;
                    btnText.textContent = 'Authenticating...';

                    let res, data;

                    if (isStudentLogin) {
                        const studentPhoneInput = document.getElementById('student-phone');
                        const phone = studentPhoneInput ? studentPhoneInput.value.trim() : '';

                        if (!phone) {
                            throw new Error("Mobile number is required.");
                        }

                        // Auto-format phone number to +639XXXXXXXXX
                        let formattedPhone = phone;
                        if (formattedPhone.startsWith('09') && formattedPhone.length === 11) {
                            formattedPhone = '+63' + formattedPhone.substring(1);
                        } else if (formattedPhone.startsWith('9') && formattedPhone.length === 10) {
                            formattedPhone = '+63' + formattedPhone;
                        } else if (formattedPhone.startsWith('639') && formattedPhone.length === 12) {
                            formattedPhone = '+' + formattedPhone;
                        }

                        res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone_number: formattedPhone })
                        });
                        data = await res.json();
                    } else {
                        const usernameInput = document.getElementById('admin-username');
                        const passwordInput = document.getElementById('admin-password');
                        const username = usernameInput ? usernameInput.value.trim() : '';
                        const password = passwordInput ? passwordInput.value : '';

                        if (!username || !password) {
                            throw new Error("Username and password are required.");
                        }

                        res = await fetch('/api/admin/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });
                        data = await res.json();
                    }

                    if (data.success) {
                        sessionStorage.setItem('adminToken', data.token);

                        if (isStudentLogin) {
                            sessionStorage.setItem('userRole', 'student');
                        } else {
                            sessionStorage.setItem('userRole', data.role || 'admin');
                        }

                        btnLoginSubmit.style.backgroundColor = 'var(--up-green)';
                        btnText.textContent = 'Login Successful!';

                        setTimeout(() => {
                            if (isStudentLogin) {
                                window.location.href = '/student-dashboard.html';
                            } else {
                                window.location.href = '/admin-dashboard.html';
                            }
                        }, 800);
                    } else {
                        throw new Error(data.error || 'Authentication failed.');
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    btnLoginSubmit.disabled = false;
                    btnText.textContent = originalBtnText;
                    btnLoginSubmit.style.backgroundColor = '';

                    loginError.textContent = err.message || 'Server connection error. Please try again.';
                    loginError.style.display = 'block';
                }
            }

            if (btnLoginSubmit) {
                btnLoginSubmit.addEventListener('click', handleLoginSubmit);
            }

            // Press enter support
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleLoginSubmit();
                }
            });
        });
    </script>
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered successfully!', reg))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</body>

</html>
